<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSUNO | Bio-Digital Customizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-light: #ffffff;
    --bg-dark: #111111;
    --panel-bg: #f6f6f6;
    --accent: #d4a373;
    --border: #e5e5e5;
  }
  body { 
    font-family: 'Syne', sans-serif; 
    background: var(--bg-light); 
    color: #111; 
    overflow: hidden; 
    height: 100vh;
  }

  /* ── ページ管理 ── */
  .page {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    transition: opacity 0.6s ease;
  }
  .page.active { display: flex; opacity: 1; }

  /* ── スタート画面 ── */
  #intro-page {
    background: var(--bg-dark);
    justify-content: center; align-items: center;
    text-align: center;
  }
  .logo-container img {
    width: 300px; height: auto;
    margin-bottom: 40px;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
  }
  .start-btn {
    padding: 15px 50px; background: none; border: 1px solid #fff;
    color: #fff; cursor: pointer; font-size: 14px; letter-spacing: 0.4em;
    transition: 0.3s;
  }
  .start-btn:hover { background: #fff; color: #000; }

  /* ── メイン生成画面 ── */
  #main-page { display: flex; flex-direction: column; }
  #viewer-container { flex: 1; position: relative; background: #fff; }

  /* 下部ステップパネル (Nike By You風) */
  #step-panel {
    height: 240px; background: var(--panel-bg);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 30px 20px; position: relative;
  }

  .step-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 40px; width: 100%; max-width: 600px;
  }
  .nav-arrow {
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd;
    background: #fff; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: 0.2s; font-size: 18px;
  }
  .nav-arrow:hover { background: #000; color: #fff; border-color: #000; }
  .nav-arrow.disabled { opacity: 0.2; cursor: default; }

  .step-content {
    text-align: center; flex: 1; display: none;
    animation: fadeIn 0.4s ease forwards;
  }
  .step-content.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .step-title { font-size: 10px; color: #888; letter-spacing: 0.3em; margin-bottom: 5px; }
  .step-name { font-size: 22px; font-weight: 800; margin-bottom: 20px; }

  /* スライダー & カラー */
  input[type=range] { -webkit-appearance: none; width: 280px; height: 2px; background: #ddd; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #000; border-radius: 50%; cursor: pointer; }

  .color-grid { display: flex; gap: 12px; justify-content: center; }
  .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
  .color-dot.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #000; }

  .finish-area { position: absolute; bottom: 20px; right: 40px; }
  .gen-btn {
    padding: 10px 20px; background: #000; color: #fff; border: none;
    font-family: 'Syne'; font-size: 11px; cursor: pointer; font-weight: 700;
  }
</style>
</head>
<body>

<div id="intro-page" class="page active">
  <div class="logo-container">
    <img src="HornGenerator_rogo.png" alt="Logo">
  </div>
  <button class="start-btn" onclick="startApp()">START CUSTOMIZE</button>
</div>

<div id="main-page" class="page">
  <div id="viewer-container">
    <div id="three-canvas"></div>
  </div>

  <div id="step-panel">
    <div class="step-nav">
      <button class="nav-arrow" id="prev-btn" onclick="changeStep(-1)">←</button>
      
      <div id="steps-container">
        <div class="step-content active" data-step="0">
          <p class="step-title">STEP 01</p>
          <p class="step-name">SIZE</p>
          <input id="i-size" type="range" min="1" max="5" value="3">
        </div>
        <div class="step-content" data-step="1">
          <p class="step-title">STEP 02</p>
          <p class="step-name">CURVE</p>
          <input id="i-bend" type="range" min="1" max="5" value="3">
        </div>
        <div class="step-content" data-step="2">
          <p class="step-title">STEP 03</p>
          <p class="step-name">BUMP</p>
          <input id="i-bump" type="range" min="1" max="5" value="3">
        </div>
        <div class="step-content" data-step="3">
          <p class="step-title">STEP 04</p>
          <p class="step-name">BRANCHES</p>
          <input id="i-branch" type="range" min="1" max="5" value="1">
        </div>
        <div class="step-content" data-step="4">
          <p class="step-title">STEP 05</p>
          <p class="step-name">COLOR</p>
          <div class="color-grid" id="palette">
            <div class="color-dot active" style="background:#ffffff;" data-color="#ffffff"></div>
            <div class="color-dot" style="background:#e8e7e2;" data-color="#e8e7e2"></div>
            <div class="color-dot" style="background:#d4a373;" data-color="#d4a373"></div>
            <div class="color-dot" style="background:#8b7355;" data-color="#8b7355"></div>
            <div class="color-dot" style="background:#222222;" data-color="#222222"></div>
          </div>
        </div>
      </div>

      <button class="nav-arrow" id="next-btn" onclick="changeStep(1)">→</button>
    </div>

    <div class="finish-area">
      <button class="gen-btn" onclick="newDNA()">REGENERATE DNA</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

let settings = { size: 3, bend: 3, bump: 3, branch: 1, color: "#ffffff" };
let dna = { seedX: 0, seedZ: 0, noise: [] };
let currentStep = 0;

window.startApp = () => {
  document.getElementById('intro-page').classList.remove('active');
  document.getElementById('main-page').classList.add('active');
  initThree();
};

window.changeStep = (dir) => {
  const steps = document.querySelectorAll('.step-content');
  steps[currentStep].classList.remove('active');
  currentStep = Math.max(0, Math.min(steps.length - 1, currentStep + dir));
  steps[currentStep].classList.add('active');
  
  document.getElementById('prev-btn').classList.toggle('disabled', currentStep === 0);
  document.getElementById('next-btn').classList.toggle('disabled', currentStep === steps.length - 1);
};

window.newDNA = () => {
  dna.seedX = Math.random() * 5;
  dna.seedZ = Math.random() * 5;
  dna.noise = Array.from({length: 120}, () => Math.random());
  updateModel();
};

let scene, camera, renderer, controls, hornGroup;

function initThree() {
  if (scene) return;
  const container = document.getElementById("viewer-container");
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);
  camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(8, 6, 12);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  document.getElementById("three-canvas").appendChild(renderer.domElement);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const l = new THREE.DirectionalLight(0xffffff, 1.2); l.position.set(10,20,10); scene.add(l);
  hornGroup = new THREE.Group();
  scene.add(hornGroup);
  animate();
  newDNA();
}

function createHornMesh(isBranch = false, startPos = new THREE.Vector3(), scale = 1.0, bId = 0) {
  const points = [];
  const segments = 100;
  const len = settings.size * 1.3 * scale;
  const bS = settings.bend * 0.3;
  for (let i = 0; i <= 10; i++) {
    const t = i / 10;
    let x, z;
    if (!isBranch) {
      x = Math.sin(t * Math.PI * 0.4 + dna.seedX) * bS * t * 2.5;
      z = Math.cos(t * Math.PI * 0.4 + dna.seedZ) * bS * t * 2.5;
    } else {
      const angle = (bId / settings.branch) * Math.PI * 2 + dna.seedX;
      x = Math.cos(angle) * (t * 2.2); z = Math.sin(angle) * (t * 2.2);
    }
    const p = new THREE.Vector3(x, t * len, z);
    if (isBranch) p.add(startPos);
    points.push(p);
  }
  const curve = new THREE.CatmullRomCurve3(points);
  const baseR = (isBranch ? 0.18 : 0.45) * (settings.size * 0.1 + 0.8);
  const geo = new THREE.TubeGeometry(curve, segments, baseR, 32, false);
  const pos = geo.attributes.position;
  const tubePts = geo.parameters.path.getPoints(segments);
  for (let i = 0; i < pos.count; i++) {
    const tIdx = Math.floor(i / 33);
    const t = tIdx / segments;
    const bump = 1 + (Math.sin(t * 30) * 0.5 + (dna.noise[tIdx] - 0.5)) * (settings.bump * 0.04) * (1-t);
    const v = new THREE.Vector3().fromBufferAttribute(pos, i);
    const c = tubePts[tIdx];
    const d = new THREE.Vector3().subVectors(v, c).normalize();
    v.copy(c).add(d.multiplyScalar(baseR * Math.pow(1 - t, 0.9) * bump));
    pos.setXYZ(i, v.x, v.y, v.z);
  }
  geo.computeVertexNormals();
  return { mesh: new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({ color: settings.color, roughness: 0.5, metalness: 0.05, side: 2 })), curve: curve };
}

function updateModel() {
  if(!hornGroup) return;
  while(hornGroup.children.length > 0) {
    const c = hornGroup.children[0];
    c.geometry.dispose(); c.material.dispose(); hornGroup.remove(c);
  }
  const main = createHornMesh();
  hornGroup.add(main.mesh);
  for (let i = 0; i < settings.branch - 1; i++) {
    const spawnPos = main.curve.getPointAt(0.25 + i * 0.15);
    hornGroup.add(createHornMesh(true, spawnPos, 0.5, i).mesh);
  }
  const box = new THREE.Box3().setFromObject(hornGroup);
  const center = box.getCenter(new THREE.Vector3());
  hornGroup.position.set(-center.x, -center.y, -center.z);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

['size', 'bend', 'bump', 'branch'].forEach(id => {
  document.getElementById('i-' + id).oninput = (e) => {
    settings[id] = parseInt(e.target.value);
    updateModel();
  };
});

document.getElementById('palette').onclick = (e) => {
  if (e.target.classList.contains('color-dot')) {
    document.querySelector('.color-dot.active').classList.remove('active');
    e.target.classList.add('active');
    settings.color = e.target.dataset.color;
    updateModel();
  }
};

window.onresize = () => {
  const c = document.getElementById("viewer-container");
  camera.aspect = c.clientWidth / c.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(c.clientWidth, c.clientHeight);
};

</script>
</body>
</html>
