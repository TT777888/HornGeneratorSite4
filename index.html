<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSUNO - Horn Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #3a3a3a;
    --header-bg: #2c2c2c;
    --panel-bg: #e8e7e2;
    --text-dark: #1a1a1a;
    --text-light: #ffffff;
    --accent: #d4a373;
    --border: rgba(255,255,255,0.12);
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Syne', 'Noto Sans JP', sans-serif;
    color: var(--text-light);
  }

  /* ── PAGES ── */
  .page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.45s ease;
  }
  .page.active { opacity: 1; pointer-events: all; }

  /* ── INTRODUCTION ── */
  #intro-page {
    justify-content: center; align-items: center;
    background: radial-gradient(circle at center, #4a4a4a 0%, #1a1a1a 100%);
    text-align: center;
  }
  #intro-page h1 { font-size: clamp(60px, 12vw, 120px); letter-spacing: 0.2em; font-weight: 800; margin-bottom: 20px; }
  .enter-btn {
    padding: 18px 60px; background: none; border: 1px solid var(--text-light);
    color: var(--text-light); cursor: pointer; font-size: 14px; letter-spacing: 0.4em;
    transition: 0.4s;
  }
  .enter-btn:hover { background: var(--text-light); color: #000; }

  /* ── GENERATE PAGE ── */
  .header {
    background: var(--header-bg); height: 60px; display: flex; align-items: center;
    padding: 0 24px; border-bottom: 1px solid var(--border); z-index: 10;
  }
  .header h2 { font-size: 14px; letter-spacing: 0.3em; font-weight: 600; }

  .main-content { flex: 1; display: flex; overflow: hidden; }

  .side-panel {
    width: 340px; background: var(--panel-bg); color: var(--text-dark);
    padding: 40px 30px; display: flex; flex-direction: column; gap: 35px;
    overflow-y: auto; box-shadow: 15px 0 40px rgba(0,0,0,0.3); z-index: 5;
  }

  .control-group h3 { font-size: 11px; letter-spacing: 0.1em; color: #888; margin-bottom: 15px; }
  .label-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  
  input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: #bbb; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--text-dark); border-radius: 50%; cursor: pointer; }

  .step-labels { display: flex; justify-content: space-between; font-size: 9px; color: #999; margin-top: 6px; }

  .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .color-opt { aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
  .color-opt.active { border-color: var(--text-dark); transform: scale(1.1); }

  .gen-btn {
    margin-top: 10px; padding: 18px; background: var(--text-dark); color: #fff;
    border: none; cursor: pointer; font-family: 'Syne'; font-weight: 700; letter-spacing: 0.2em; font-size: 12px;
  }
  .gen-btn:hover { opacity: 0.9; }

  #viewer { flex: 1; background: #1a1a1a; position: relative; }
</style>
</head>
<body>

<div id="intro-page" class="page active">
  <div style="font-size: 10px; letter-spacing: 0.8em; margin-bottom: 15px; color: rgba(255,255,255,0.5);">BIO-DIGITAL SPECIMEN</div>
  <h1>TSUNO</h1>
  <button class="enter-btn" onclick="navTo('generate')">GENERATE</button>
</div>

<div id="generate-page" class="page">
  <div class="header">
    <h2>TSUNO GENERATOR v7</h2>
  </div>
  <div class="main-content">
    <div class="side-panel">
      <div class="control-group">
        <h3>MORPHOLOGY</h3>
        <div class="label-row"><span>SIZE</span><span id="val-size">3</span></div>
        <input id="in-size" type="range" min="1" max="5" step="1" value="3">
        <div class="step-labels"><span>SHORT</span><span>MID</span><span>LONG</span></div>
      </div>

      <div class="control-group">
        <div class="label-row"><span>CURVE</span><span id="val-bend">3</span></div>
        <input id="in-bend" type="range" min="1" max="5" step="1" value="3">
        <div class="step-labels"><span>STRAIGHT</span><span>MID</span><span>CURVED</span></div>
      </div>

      <div class="control-group">
        <div class="label-row"><span>BUMP</span><span id="val-bump">3</span></div>
        <input id="in-bump" type="range" min="1" max="5" step="1" value="3">
        <div class="step-labels"><span>SMOOTH</span><span>NATURAL</span><span>ROUGH</span></div>
      </div>

      <div class="control-group">
        <div class="label-row"><span>BRANCHES</span><span id="val-branch">1</span></div>
        <input id="in-branch" type="range" min="1" max="5" step="1" value="1">
        <div class="step-labels"><span>NONE</span><span>MANY</span></div>
      </div>

      <div class="control-group">
        <h3>AESTHETIC</h3>
        <div class="color-grid" id="color-palette">
          <div class="color-opt active" style="background:#ffffff;" data-color="#ffffff"></div>
          <div class="color-opt" style="background:#e8e7e2;" data-color="#e8e7e2"></div>
          <div class="color-opt" style="background:#d4a373;" data-color="#d4a373"></div>
          <div class="color-opt" style="background:#8b7355;" data-color="#8b7355"></div>
          <div class="color-opt" style="background:#2a2a2a;" data-color="#2a2a2a"></div>
        </div>
      </div>

      <button class="gen-btn" onclick="regenerateDNA()">REGENERATE DNA</button>
    </div>
    <div id="viewer"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// --- State ---
let settings = { size: 3, bend: 3, bump: 3, branch: 1, color: "#ffffff" };
let dna = { seedX: Math.random()*5, seedZ: Math.random()*5, noise: Array.from({length: 120}, () => Math.random()) };

// --- Navigation ---
window.navTo = (pageId) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId + '-page').classList.add('active');
  if(pageId === 'generate') initThree();
};

window.regenerateDNA = () => {
  dna.seedX = Math.random()*5;
  dna.seedZ = Math.random()*5;
  dna.noise = Array.from({length: 120}, () => Math.random());
  updateModel();
};

// --- Three.js Logic ---
let scene, camera, renderer, controls, hornGroup;

function initThree() {
  if (scene) return;
  const container = document.getElementById("viewer");
  
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);
  
  camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(10, 8, 15);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  container.appendChild(renderer.domElement);
  
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const l1 = new THREE.DirectionalLight(0xffffff, 2); l1.position.set(5,15,5); scene.add(l1);
  const l2 = new THREE.PointLight(0xffffff, 1.5); l2.position.set(-10, 0, -10); scene.add(l2);

  hornGroup = new THREE.Group();
  scene.add(hornGroup);

  animate();
  updateModel();
}

function createHornMesh(isBranch = false, startPos = new THREE.Vector3(), customScale = 1.0, branchId = 0) {
  const points = [];
  const segments = 100;
  
  const length = settings.size * 1.3 * customScale;
  const bendStrength = settings.bend * 0.35;
  const bumpStrength = settings.bump * 0.045;

  // Spine calculation
  for (let i = 0; i <= 10; i++) {
    const t = i / 10;
    let x, z;
    if (!isBranch) {
      x = Math.sin(t * Math.PI * 0.5 + dna.seedX) * bendStrength * t * 2.5;
      z = Math.cos(t * Math.PI * 0.5 + dna.seedZ) * bendStrength * t * 2.5;
    } else {
      const angle = (branchId / settings.branch) * Math.PI * 2 + dna.seedX;
      x = Math.cos(angle) * (t * 2.2);
      z = Math.sin(angle) * (t * 2.2);
      x += Math.sin(t * Math.PI * 0.2) * (bendStrength * 0.4);
    }
    const p = new THREE.Vector3(x, t * length, z);
    if (isBranch) p.add(startPos);
    points.push(p);
  }

  const curve = new THREE.CatmullRomCurve3(points);
  const baseR = (isBranch ? 0.16 : 0.45) * (settings.size * 0.1 + 0.8);
  const geometry = new THREE.TubeGeometry(curve, segments, baseR, 24, false);
  
  const vertices = geometry.attributes.position;
  const tubePoints = geometry.parameters.path.getPoints(segments);

  // Surface Displacement (Bumps)
  for (let i = 0; i < vertices.count; i++) {
    const tIdx = Math.floor(i / (geometry.parameters.radialSegments + 1));
    const t = tIdx / segments;
    const taper = Math.pow(1 - t, 0.9);
    const noise = dna.noise[tIdx] || 0.5;
    const bump = 1 + (Math.sin(t * 30) * 0.4 + (noise - 0.5)) * bumpStrength * (1-t);
    
    const vertex = new THREE.Vector3().fromBufferAttribute(vertices, i);
    const center = tubePoints[tIdx];
    const dir = new THREE.Vector3().subVectors(vertex, center).normalize();
    
    vertex.copy(center).add(dir.multiplyScalar(Math.max(0.01, baseR * taper * bump)));
    vertices.setXYZ(i, vertex.x, vertex.y, vertex.z);
  }
  
  geometry.computeVertexNormals();
  const material = new THREE.MeshPhysicalMaterial({
    color: settings.color, roughness: 0.6, metalness: 0.1, side: THREE.DoubleSide
  });

  return { mesh: new THREE.Mesh(geometry, material), curve: curve };
}

function updateModel() {
  if (!hornGroup) return;
  while(hornGroup.children.length > 0) {
    const c = hornGroup.children[0];
    c.geometry.dispose(); c.material.dispose();
    hornGroup.remove(c);
  }

  const main = createHornMesh();
  hornGroup.add(main.mesh);

  const bc = settings.branch - 1;
  for (let i = 0; i < bc; i++) {
    const t = 0.25 + (i * 0.15);
    const spawnPos = main.curve.getPointAt(t);
    const branch = createHornMesh(true, spawnPos, 0.55, i);
    hornGroup.add(branch.mesh);
  }

  // Center model
  const box = new THREE.Box3().setFromObject(hornGroup);
  const center = box.getCenter(new THREE.Vector3());
  hornGroup.position.set(-center.x, -center.y, -center.z);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// --- UI Listeners ---
['size', 'bend', 'bump', 'branch'].forEach(id => {
  const input = document.getElementById('in-' + id);
  input.oninput = (e) => {
    settings[id] = parseInt(e.target.value);
    document.getElementById('val-' + id).innerText = settings[id];
    updateModel();
  };
});

document.querySelectorAll('.color-opt').forEach(opt => {
  opt.onclick = () => {
    document.querySelector('.color-opt.active').classList.remove('active');
    opt.classList.add('active');
    settings.color = opt.dataset.color;
    updateModel();
  };
});

window.addEventListener('resize', () => {
  if (!renderer) return;
  const container = document.getElementById("viewer");
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

</script>
</body>
</html>
