<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSUNO | Bio-Digital Customizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; /* NIKE By You風の清潔な白背景 */
    --panel-bg: #f5f5f5;
    --text-main: #111111;
    --accent: #d4a373;
    --border: #e5e5e5;
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text-main);
  }

  /* ── LAYOUT ── */
  #app {
    display: flex; flex-direction: column;
    height: 100vh; width: 100vw;
  }

  /* 上部：3Dビューア */
  #viewer-container {
    flex: 1; /* 残りのスペースをすべて使う */
    position: relative;
    cursor: grab;
  }
  #viewer-container:active { cursor: grabbing; }

  /* 下部：パラメータ設定エリア */
  #editor-panel {
    height: 320px;
    background: var(--panel-bg);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 30px 50px;
    z-index: 100;
  }

  .editor-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 25px;
  }
  .editor-header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .editor-header .dna-id { font-size: 10px; color: #888; letter-spacing: 0.1em; }

  .controls-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr) 200px; /* スライダー4つ + カラー */
    gap: 40px;
  }

  .control-group { display: flex; flex-direction: column; gap: 12px; }
  .control-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
  .control-label span:last-child { color: var(--accent); }

  /* スライダーカスタム */
  input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: #ddd; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #000; border-radius: 50%; cursor: pointer; transition: 0.2s; }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .step-markers { display: flex; justify-content: space-between; margin-top: 8px; }
  .step-markers span { font-size: 9px; color: #aaa; }

  /* カラーパレット */
  .color-selector { display: flex; gap: 8px; margin-top: 5px; }
  .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); transition: 0.2s; }
  .color-dot.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #000; }

  .action-area {
    margin-top: auto; display: flex; justify-content: flex-end;
  }
  .gen-btn {
    padding: 12px 30px; background: #000; color: #fff; border: none;
    font-family: 'Syne'; font-weight: 700; font-size: 12px; cursor: pointer;
    letter-spacing: 0.1em;
  }
  .gen-btn:hover { background: #333; }

  .axes-hint { position: absolute; top: 30px; left: 30px; font-size: 10px; color: #bbb; line-height: 1.6; }

</style>
</head>
<body>

<div id="app">
  <div id="viewer-container">
    <div class="axes-hint">
      3D SPECIMEN VIEWER<br>
      LEFT DRAG TO ROTATE<br>
      SCROLL TO ZOOM
    </div>
    <div id="three-canvas"></div>
  </div>

  <div id="editor-panel">
    <div class="editor-header">
      <h1>TSUNO BY YOU</h1>
      <div class="dna-id" id="dna-code">DNA-SEED: #000000</div>
    </div>

    <div class="controls-grid">
      <div class="control-group">
        <div class="control-label"><span>SIZE</span><span id="v-size">3</span></div>
        <input id="i-size" type="range" min="1" max="5" step="1" value="3">
        <div class="step-markers"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
      </div>

      <div class="control-group">
        <div class="control-label"><span>CURVE</span><span id="v-bend">3</span></div>
        <input id="i-bend" type="range" min="1" max="5" step="1" value="3">
        <div class="step-markers"><span>MIN</span><span>MID</span><span>MAX</span></div>
      </div>

      <div class="control-group">
        <div class="control-label"><span>BUMP</span><span id="v-bump">3</span></div>
        <input id="i-bump" type="range" min="1" max="5" step="1" value="3">
        <div class="step-markers"><span>SMOOTH</span><span>BIO</span><span>RAW</span></div>
      </div>

      <div class="control-group">
        <div class="control-label"><span>BRANCHES</span><span id="v-branch">1</span></div>
        <input id="i-branch" type="range" min="1" max="5" step="1" value="1">
        <div class="step-markers"><span>NONE</span><span>FEW</span><span>MANY</span></div>
      </div>

      <div class="control-group">
        <div class="control-label"><span>COLOR</span></div>
        <div class="color-selector" id="palette">
          <div class="color-dot active" style="background:#ffffff;" data-color="#ffffff"></div>
          <div class="color-dot" style="background:#f0f0f0;" data-color="#f0f0f0"></div>
          <div class="color-dot" style="background:#d4a373;" data-color="#d4a373"></div>
          <div class="color-dot" style="background:#8b7355;" data-color="#8b7355"></div>
          <div class="color-dot" style="background:#222222;" data-color="#222222"></div>
        </div>
      </div>
    </div>

    <div class="action-area">
      <button class="gen-btn" onclick="newDNA()">GENERATE NEW DNA</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// --- State ---
let settings = { size: 3, bend: 3, bump: 3, branch: 1, color: "#ffffff" };
let dna = { seedX: 0, seedZ: 0, noise: [] };

// --- Init & Build ---
window.newDNA = () => {
  dna.seedX = Math.random() * 5;
  dna.seedZ = Math.random() * 5;
  dna.noise = Array.from({length: 120}, () => Math.random());
  document.getElementById('dna-code').innerText = `DNA-SEED: #${Math.floor(Math.random()*16777215).toString(16).toUpperCase()}`;
  updateModel();
};

const container = document.getElementById("viewer-container");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(8, 6, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById("three-canvas").appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
mainLight.position.set(10, 20, 10);
scene.add(mainLight);
const fillLight = new THREE.PointLight(0xffffff, 0.5);
fillLight.position.set(-10, 5, -5);
scene.add(fillLight);

const hornGroup = new THREE.Group();
scene.add(hornGroup);

function createHornMesh(isBranch = false, startPos = new THREE.Vector3(), scale = 1.0, bId = 0) {
  const points = [];
  const segments = 100;
  
  // 5段階調整（リクエストに基づきマイルドに再構成）
  const len = settings.size * 1.3 * scale;
  const bStrength = settings.bend * 0.3; // 曲がりすぎを抑制した5段階
  const bumpStrength = settings.bump * 0.04;

  for (let i = 0; i <= 10; i++) {
    const t = i / 10;
    let x, z;
    if (!isBranch) {
      x = Math.sin(t * Math.PI * 0.4 + dna.seedX) * bStrength * t * 2.5;
      z = Math.cos(t * Math.PI * 0.4 + dna.seedZ) * bStrength * t * 2.5;
    } else {
      // 非干渉の分岐ロジック
      const angle = (bId / settings.branch) * Math.PI * 2 + dna.seedX;
      x = Math.cos(angle) * (t * 2.2);
      z = Math.sin(angle) * (t * 2.2);
      x += Math.sin(t * Math.PI * 0.2) * (bStrength * 0.4);
    }
    const p = new THREE.Vector3(x, t * len, z);
    if (isBranch) p.add(startPos);
    points.push(p);
  }

  const curve = new THREE.CatmullRomCurve3(points);
  const baseR = (isBranch ? 0.18 : 0.45) * (settings.size * 0.1 + 0.8);
  const geometry = new THREE.TubeGeometry(curve, segments, baseR, 32, false);
  
  const vertices = geometry.attributes.position;
  const tubePoints = geometry.parameters.path.getPoints(segments);

  for (let i = 0; i < vertices.count; i++) {
    const tIdx = Math.floor(i / (geometry.parameters.radialSegments + 1));
    const t = tIdx / segments;
    const taper = Math.pow(1 - t, 0.9);
    const noise = dna.noise[tIdx] || 0.5;
    // リアルな大小の差を激しくした凹凸
    const bump = 1 + (Math.sin(t * 30) * 0.5 + (noise - 0.5)) * bumpStrength * (1-t);
    
    const vertex = new THREE.Vector3().fromBufferAttribute(vertices, i);
    const center = tubePoints[tIdx];
    const dir = new THREE.Vector3().subVectors(vertex, center).normalize();
    
    vertex.copy(center).add(dir.multiplyScalar(Math.max(0.01, baseR * taper * bump)));
    vertices.setXYZ(i, vertex.x, vertex.y, vertex.z);
  }
  
  geometry.computeVertexNormals();
  const material = new THREE.MeshPhysicalMaterial({
    color: settings.color,
    roughness: 0.5,
    metalness: 0.05,
    side: THREE.DoubleSide
  });

  return { mesh: new THREE.Mesh(geometry, material), curve: curve };
}

function updateModel() {
  while(hornGroup.children.length > 0) {
    const c = hornGroup.children[0];
    c.geometry.dispose(); c.material.dispose();
    hornGroup.remove(c);
  }

  const main = createHornMesh();
  hornGroup.add(main.mesh);

  const bc = settings.branch - 1;
  for (let i = 0; i < bc; i++) {
    const t = 0.25 + (i * 0.15);
    const spawnPos = main.curve.getPointAt(t);
    const branch = createHornMesh(true, spawnPos, 0.5, i);
    hornGroup.add(branch.mesh);
  }

  const box = new THREE.Box3().setFromObject(hornGroup);
  const center = box.getCenter(new THREE.Vector3());
  hornGroup.position.set(-center.x, -center.y, -center.z);
}

// UI
['size', 'bend', 'bump', 'branch'].forEach(id => {
  const el = document.getElementById('i-' + id);
  el.oninput = (e) => {
    settings[id] = parseInt(e.target.value);
    document.getElementById('v-' + id).innerText = settings[id];
    updateModel();
  };
});

document.getElementById('palette').onclick = (e) => {
  if (e.target.classList.contains('color-dot')) {
    document.querySelector('.color-dot.active').classList.remove('active');
    e.target.classList.add('active');
    settings.color = e.target.dataset.color;
    updateModel();
  }
};

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

newDNA();
animate();

</script>
</body>
</html>
