<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSUNO | Bio-Digital Customizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-white: #ffffff;
    --panel-bg: #f6f6f6;
    --accent: #d4a373;
    --border: #e5e5e5;
    --text-black: #111111;
  }
  body { 
    font-family: 'Syne', sans-serif; 
    background: var(--bg-white); 
    color: var(--text-black); 
    overflow: hidden; 
    height: 100vh;
  }

  /* ── ページ管理 ── */
  .page {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    opacity: 0; transition: opacity 0.5s ease;
  }
  .page.active { display: flex; opacity: 1; z-index: 10; }

  /* ── スタート画面 (白背景・黒ロゴ) ── */
  #intro-page {
    background: var(--bg-white);
    justify-content: center; align-items: center;
    text-align: center;
  }
  .logo-container img {
    width: 320px; height: auto;
    margin-bottom: 40px;
  }
  .start-btn {
    padding: 16px 60px; background: var(--text-black); border: none;
    color: #fff; cursor: pointer; font-size: 14px; letter-spacing: 0.3em;
    font-weight: 700; transition: 0.3s;
  }
  .start-btn:hover { opacity: 0.8; transform: translateY(-2px); }

  /* ── メイン生成画面 (Nike By Youレイアウト) ── */
  #main-page { display: flex; flex-direction: column; }
  
  /* 上部：3Dビューア */
  #viewer-container { 
    flex: 1; position: relative; background: #fff; 
    cursor: grab;
  }
  #viewer-container:active { cursor: grabbing; }

  /* 下部：ステップパネル */
  #step-panel {
    height: 260px; background: var(--panel-bg);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 30px 20px; position: relative;
    z-index: 100;
  }

  .step-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 50px; width: 100%; max-width: 700px;
  }
  .nav-arrow {
    width: 45px; height: 45px; border-radius: 50%; border: 1px solid #ddd;
    background: #fff; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: 0.2s; font-size: 20px;
  }
  .nav-arrow:hover { background: #000; color: #fff; border-color: #000; }
  .nav-arrow.disabled { opacity: 0.1; cursor: default; pointer-events: none; }

  .step-content {
    text-align: center; flex: 1; display: none;
  }
  .step-content.active { display: block; animation: slideIn 0.4s ease forwards; }
  
  @keyframes slideIn { 
    from { opacity: 0; transform: translateY(10px); } 
    to { opacity: 1; transform: translateY(0); } 
  }

  .step-title { font-size: 10px; color: #888; letter-spacing: 0.3em; margin-bottom: 8px; font-weight: 700; }
  .step-name { font-size: 24px; font-weight: 800; margin-bottom: 25px; letter-spacing: -0.02em; }

  /* スライダー & カラーカスタム */
  input[type=range] { -webkit-appearance: none; width: 300px; height: 2px; background: #ddd; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #000; border-radius: 50%; cursor: pointer; }

  .color-grid { display: flex; gap: 15px; justify-content: center; }
  .color-dot { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); transition: 0.2s; }
  .color-dot:hover { transform: scale(1.1); }
  .color-dot.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #000; }

  .dna-info { position: absolute; bottom: 25px; left: 40px; font-size: 9px; color: #aaa; letter-spacing: 0.1em; }
  .finish-area { position: absolute; bottom: 25px; right: 40px; }
  .gen-btn {
    padding: 12px 24px; background: #000; color: #fff; border: none;
    font-family: 'Syne'; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<div id="intro-page" class="page active">
  <div class="logo-container">
    <img src="HornGenerator_rogo_black.png" alt="TSUNO Logo">
  </div>
  <button class="start-btn" onclick="startApp()">START CUSTOMIZING</button>
</div>

<div id="main-page" class="page">
  <div id="viewer-container">
    <div id="three-canvas" style="width:100%; height:100%;"></div>
  </div>

  <div id="step-panel">
    <div class="step-nav">
      <button class="nav-arrow" id="prev-btn" onclick="changeStep(-1)">←</button>
      
      <div id="steps-container">
        <div class="step-content active" data-step="0">
          <p class="step-title">STEP 01</p>
          <p class="step-name">SIZE</p>
          <input id="i-size" type="range" min="1" max="5" value="3">
        </div>
        <div class="step-content" data-step="1">
          <p class="step-title">STEP 02</p>
          <p class="step-name">CURVE</p>
          <input id="i-bend" type="range" min="1" max="5" value="3">
        </div>
        <div class="step-content" data-step="2">
          <p class="step-title">STEP 03</p>
          <p class="step-name">BUMP</p>
          <input id="i-bump" type="range" min="1" max="5" value="3">
        </div>
        <div class="step-content" data-step="3">
          <p class="step-title">STEP 04</p>
          <p class="step-name">BRANCHES</p>
          <input id="i-branch" type="range" min="1" max="5" value="1">
        </div>
        <div class="step-content" data-step="4">
          <p class="step-title">STEP 05</p>
          <p class="step-name">COLOR</p>
          <div class="color-grid" id="palette">
            <div class="color-dot active" style="background:#ffffff;" data-color="#ffffff"></div>
            <div class="color-dot" style="background:#f0f0f0;" data-color="#f0f0f0"></div>
            <div class="color-dot" style="background:#d4a373;" data-color="#d4a373"></div>
            <div class="color-dot" style="background:#8b7355;" data-color="#8b7355"></div>
            <div class="color-dot" style="background:#222222;" data-color="#222222"></div>
          </div>
        </div>
      </div>

      <button class="nav-arrow" id="next-btn" onclick="changeStep(1)">→</button>
    </div>

    <div class="dna-info" id="dna-text">DNA-ID: #8A4F2C</div>
    <div class="finish-area">
      <button class="gen-btn" onclick="newDNA()">REGENERATE DNA</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// --- 状態管理 ---
let settings = { size: 3, bend: 3, bump: 3, branch: 1, color: "#ffffff" };
let dna = { seedX: Math.random()*5, seedZ: Math.random()*5, noise: Array.from({length: 120}, () => Math.random()) };
let currentStep = 0;

// ページ遷移
window.startApp = () => {
  document.getElementById('intro-page').classList.remove('active');
  document.getElementById('main-page').classList.add('active');
  initThree(); // 画面切り替え後に描画開始
};

// ステップ切り替え (Nike風)
window.changeStep = (dir) => {
  const steps = document.querySelectorAll('.step-content');
  steps[currentStep].classList.remove('active');
  currentStep = Math.max(0, Math.min(steps.length - 1, currentStep + dir));
  steps[currentStep].classList.add('active');
  
  document.getElementById('prev-btn').classList.toggle('disabled', currentStep === 0);
  document.getElementById('next-btn').classList.toggle('disabled', currentStep === steps.length - 1);
};

window.newDNA = () => {
  dna.seedX = Math.random() * 5;
  dna.seedZ = Math.random() * 5;
  dna.noise = Array.from({length: 120}, () => Math.random());
  document.getElementById('dna-text').innerText = `DNA-ID: #${Math.floor(Math.random()*16777215).toString(16).toUpperCase()}`;
  updateModel();
};

// --- Three.js ロジック ---
let scene, camera, renderer, controls, hornGroup;

function initThree() {
  const container = document.getElementById("viewer-container");
  if (!container) return;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(8, 6, 12);

  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  document.getElementById("three-canvas").appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // 照明
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 1.2);
  sun.position.set(10, 20, 10);
  scene.add(sun);

  hornGroup = new THREE.Group();
  scene.add(hornGroup);

  animate();
  updateModel();
}

function createHornMesh(isBranch = false, startPos = new THREE.Vector3(), scale = 1.0, bId = 0) {
  const points = [];
  const segments = 100;
  const len = settings.size * 1.3 * scale;
  const bS = settings.bend * 0.3; // 5段階調整

  for (let i = 0; i <= 10; i++) {
    const t = i / 10;
    let x, z;
    if (!isBranch) {
      x = Math.sin(t * Math.PI * 0.4 + dna.seedX) * bS * t * 2.5;
      z = Math.cos(t * Math.PI * 0.4 + dna.seedZ) * bS * t * 2.5;
    } else {
      const angle = (bId / settings.branch) * Math.PI * 2 + dna.seedX;
      x = Math.cos(angle) * (t * 2.2);
      z = Math.sin(angle) * (t * 2.2);
    }
    const p = new THREE.Vector3(x, t * len, z);
    if (isBranch) p.add(startPos);
    points.push(p);
  }

  const curve = new THREE.CatmullRomCurve3(points);
  const baseR = (isBranch ? 0.18 : 0.45) * (settings.size * 0.1 + 0.8);
  const geo = new THREE.TubeGeometry(curve, segments, baseR, 32, false);
  
  const pos = geo.attributes.position;
  const tubePts = geo.parameters.path.getPoints(segments);

  for (let i = 0; i < pos.count; i++) {
    const tIdx = Math.floor(i / 33);
    const t = tIdx / segments;
    const bump = 1 + (Math.sin(t * 30) * 0.5 + (dna.noise[tIdx] - 0.5)) * (settings.bump * 0.04) * (1-t);
    const v = new THREE.Vector3().fromBufferAttribute(pos, i);
    const c = tubePts[tIdx];
    const d = new THREE.Vector3().subVectors(v, c).normalize();
    v.copy(c).add(d.multiplyScalar(baseR * Math.pow(1 - t, 0.9) * bump));
    pos.setXYZ(i, v.x, v.y, v.z);
  }
  geo.computeVertexNormals();

  return { mesh: new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({
    color: settings.color, roughness: 0.5, metalness: 0.05, side: 2
  })), curve: curve };
}

function updateModel() {
  if(!hornGroup) return;
  while(hornGroup.children.length > 0) {
    const c = hornGroup.children[0];
    c.geometry.dispose(); c.material.dispose(); hornGroup.remove(c);
  }

  const main = createHornMesh();
  hornGroup.add(main.mesh);

  const bc = settings.branch - 1;
  for (let i = 0; i < bc; i++) {
    const t = 0.25 + (i * 0.15);
    const spawnPos = main.curve.getPointAt(t);
    hornGroup.add(createHornMesh(true, spawnPos, 0.55, i).mesh);
  }

  // 中心調整
  const box = new THREE.Box3().setFromObject(hornGroup);
  const center = box.getCenter(new THREE.Vector3());
  hornGroup.position.set(-center.x, -center.y, -center.z);
}

function animate() {
  requestAnimationFrame(animate);
  if (controls) controls.update();
  if (renderer && scene && camera) renderer.render(scene, camera);
}

// イベントリスナー
['size', 'bend', 'bump', 'branch'].forEach(id => {
  const el = document.getElementById('i-' + id);
  if (el) el.oninput = (e) => {
    settings[id] = parseInt(e.target.value);
    updateModel();
  };
});

document.getElementById('palette').onclick = (e) => {
  if (e.target.classList.contains('color-dot')) {
    document.querySelector('.color-dot.active').classList.remove('active');
    e.target.classList.add('active');
    settings.color = e.target.dataset.color;
    updateModel();
  }
};

window.onresize = () => {
  const c = document.getElementById("viewer-container");
  if (!c || !camera || !renderer) return;
  camera.aspect = c.clientWidth / c.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(c.clientWidth, c.clientHeight);
};

</script>
</body>
</html>
